}

.board{

        0 0 30px rgba(0,0,0,.3);
}

.picture{
    position:absolute;

    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
}

.cover{
    position:absolute;
    z-index:2;

}

.green{

}

.red{
    left:0;

    width:50%;
    height:50%;
    background:#e74c3c;
}

.blue{
    right:0;
    bottom:0;
    width:50%;
    height:50%;

}

.center{
position:absolute;

width:350px;
height:350px;

left:175px;

}

#timer{

}

#result{

        0 0 10px rgba(255,255,255,.5),

}

<script>

let seconds = 0;
let timerInterval;
let whiteStep = 1;
let currentQuestion = "";
let currentTeam = "";
let finalAnswerUsed = false;

const teamUsage = {

    yellow:0,
    green:0,
    blue:0,
    red:0
};
const teamNames = {
    yellow : "ĐỘI VÀNG 🟨",
    green  : "ĐỘI LỤC 🟩",
    blue   : "ĐỘI LAM 🟦",
    red    : "ĐỘI ĐỎ 🟥"
};

const pieceNames = {
    red: "Đỏ",
    yellow: "Vàng",
    green: "Lục",
    blue: "Lam",
    white: "Trắng"
};

function startTimer(){

    clearInterval(timerInterval);

    timerInterval = setInterval(() => {

        seconds++;

        const min =
            String(Math.floor(seconds / 60))
            .padStart(2,"0");

        const sec =
            String(seconds % 60)
            .padStart(2,"0");

        document.getElementById("timer").innerText =
            `⏱️ ${min}:${sec}`;
socket.emit("timer-update", {
    team: currentTeam,
    time: `${min}:${sec}`
});
    },1000);

}   

function revealOwnPiece(team){

    const piece =
        document.getElementById(team);

    if(piece){
        piece.style.display = "none";
    }

}

function enterGame(team){
currentTeam = team;
    localStorage.setItem("team", team);

    document.getElementById("loginBox").style.display =
        "none";

    document.getElementById("gameArea").style.display =
        "block";

    const teamTitle =
        document.getElementById("teamName");

    teamTitle.innerText =
        teamNames[team];

    if(team === "yellow"){
        teamTitle.style.color = "#f1c40f";
    }

    if(team === "green"){
        teamTitle.style.color = "#27ae60";
    }

    if(team === "blue"){
        teamTitle.style.color = "#3498db";
    }

    if(team === "red"){
        teamTitle.style.color = "#e74c3c";
    }

    revealOwnPiece(team);

startTimer();
}

function login(){

    const pass =
        document.getElementById("password").value;

    if(pass === "vang312"){

        enterGame("yellow");

    }else if(pass === "luc231"){

        enterGame("green");

    }else if(pass === "lam213"){

        enterGame("blue");

    }else if(pass === "do321"){

        enterGame("red");

    }else{

        alert("Sai mật mã!");

    }

}

function logout(){

    localStorage.removeItem("team");

    location.reload();

}

function checkAnswer(){
    if(finalAnswerUsed){
    return;
}

    const answer =
        document.getElementById("answer")
        .value
        .trim()
        .toLowerCase();

    if(
        answer === "chuột" ||
        answer === "tý" ||
        answer === "ty" ||
        answer === "ti" ||
        answer === "tí"
    ){

        document.getElementById("yellow").style.display = "none";
        document.getElementById("green").style.display = "none";
        document.getElementById("red").style.display = "none";
        document.getElementById("blue").style.display = "none";
        document.getElementById("center").style.display = "none";

        clearInterval(timerInterval);
socket.emit("team-finished", {
    team: currentTeam,
    time: document.getElementById("timer").innerText
});
        document.getElementById("answer").disabled = true;
        document.getElementById("answerBtn").disabled = true;

        document.getElementById("result").innerHTML =
    "🏆 CHÚC MỪNG!<br><br>" +
    "✅ Hoàn thành trong " +
    document.getElementById("timer").innerText;

  }else{

    finalAnswerUsed = true;
localStorage.setItem("finalLocked", "true");
    document.getElementById("answer").disabled = true;
    document.getElementById("answerBtn").disabled = true;

    document.getElementById("result").innerHTML =
        "❌ RẤT TIẾC!<br><br>" +
        "Đội của bạn đã sử dụng cơ hội duy nhất để trả lời đáp án cuối cùng.<br><br>" +
        "🔒 Quyền trả lời đã bị khóa.";

}

}
function showQuestion(color){

    document.getElementById("questionBox")
        .style.display = "block";

    document.getElementById("questionTitle")
        .innerText =
        "Câu hỏi " + color;
currentQuestion = color;

if(color === "white"){

    if(whiteStep === 1){

        document.getElementById("questionImage")
            .src =
            "questions/1white.jpg";

    }else{

        document.getElementById("questionImage")
            .src =
            "questions/2white.jpg";

    }

    return;
}
    document.getElementById("questionImage")
        .src =
        "questions/" + color + ".jpg";
}
function submitAnswer(){

    const answer =
        document.getElementById("questionAnswer")
        .value
        .trim()
        .toLowerCase();

    // Ô trắng
    if(currentQuestion === "white"){

        if(
            whiteStep === 1 &&
            (
                answer === "trái đất" ||
                answer === "trai dat"
            )
        ){

            alert("✅ Chính xác! Chuyển sang câu 2");

            whiteStep = 2;

            document.getElementById("questionImage").src =
                "questions/2white.jpg";

            document.getElementById("questionAnswer").value = "";

            return;
        }

        if(
            whiteStep === 2 &&
            (
                answer === "bài ca nhà tranh bị gió thu phá" ||
                answer === "bai ca nha tranh bi gio thu pha"
            )
        ){

            document.getElementById("center").style.display = "none";

            document.getElementById("questionBox").style.display = "none";
socket.emit("piece-opened", {
    team: currentTeam,
    piece: "white"
});
            alert("🎉 Đã mở ô trắng!");

            return;
        }
    }

    // Mảnh vàng = giờ hiện tại
    if(currentQuestion === "yellow"){

        const now = new Date();

        const h = now.getHours();
        const m = String(now.getMinutes()).padStart(2,"0");

        const answer1 = `${h}:${m}`;
        const answer2 = `${parseInt(h)}:${m}`;

        if(answer === answer1 || answer === answer2){

            document.getElementById("yellow").style.display = "none";

            document.getElementById("questionBox").style.display = "none";
if(answer === answer1 || answer === answer2){

    document.getElementById("yellow").style.display = "none";

    document.getElementById("questionBox").style.display = "none";

    socket.emit("piece-opened", {
        team: currentTeam,
        piece: "yellow"
    });

    alert("🎉 Đã mở mảnh Vàng!");
}
        }else{

            alert("❌ Sai đáp án!");
        }

        return;
    }

    // Mảnh lục
    if(currentQuestion === "green"){
       
        if(answer === "checkmate"){

            document.getElementById("green").style.display = "none";

            document.getElementById("questionBox").style.display = "none";
socket.emit("piece-opened", {
    team: currentTeam,
    piece: "green"
});
            alert("🎉 Đã mở mảnh Lục!");

        }else{

            alert("❌ Sai đáp án!");
        }

        return;
    }

    // Mảnh đỏ
    if(currentQuestion === "red"){

        if(answer === "brain"){

    document.getElementById("red").style.display = "none";

    document.getElementById("questionBox").style.display = "none";

    socket.emit("piece-opened", {
        team: currentTeam,
        piece: "red"
    });

    alert("🎉 Đã mở mảnh Đỏ!");

        }else{

            alert("❌ Sai đáp án!");
        }

        return;
    }

    // Mảnh lam
    if(currentQuestion === "blue"){

        if(answer === "rainbow"){

            document.getElementById("blue").style.display = "none";

            document.getElementById("questionBox").style.display = "none";
socket.emit("piece-opened", {
    team: currentTeam,
    piece: "blue"
});
            alert("🎉 Đã mở mảnh Lam!");

        }else{

            alert("❌ Sai đáp án!");
        }

        return;
    }
}

</script>
