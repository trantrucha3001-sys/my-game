<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thưởng hay Phạt </title>

<style>

body{
    margin:0;
    min-height:100vh;

    background:
    linear-gradient(135deg,#0f172a,#1e293b);

    font-family:'Segoe UI',sans-serif;
}

h1{
    color:white;
    text-align:center;
    font-size:42px;
    font-weight:800;
    margin-top:0;
    margin-bottom:10px;
}

h2{
    color:white;
    text-align:center;
    font-size:24px;
    font-weight:500;
    margin-top:0;
}

#teamName{
    text-align:center;

    font-size:32px;

    font-weight:800;

    margin-top:10px;

    margin-bottom:20px;
}

#questionGrid{
    display:grid;
    grid-template-columns:repeat(4,120px);
    gap:12px;
    justify-content:center;
    margin-top:20px;
}

.questionBtn{
    width:120px;
    height:120px;

    font-size:36px;
    font-weight:800;

    cursor:pointer;

    border:none;

    border-radius:20px;

    background:#111827;

    color:white;

    transition:.2s;
}
.questionBtn:hover{
    transform:translateY(-5px);

    box-shadow:
        0 0 20px rgba(241,196,15,.4);
}
.used{
    background:#888 !important;
    color:white;
    pointer-events:none;
}

#questionBox{
    display:none;

    margin-top:30px;

    background:white;

    padding:20px;

    border-radius:10px;

    width:700px;

    margin-left:auto;

    margin-right:auto;
}

#questionText{
    color:#111827;

    font-size:28px;

    font-weight:700;

    margin-bottom:20px;
}

#timer{
    font-size:40px;
    font-weight:bold;
    color:red;
    margin:15px;
}

input{
    width:320px;

    padding:14px;

    font-size:18px;

    border:none;

    border-radius:12px;

    outline:none;

    background:white;

    display:block;
    margin:auto;
}

.answerBtn{
    padding:10px 20px;
    font-size:18px;
    margin-left:10px;
}

#result{
    font-size:24px;
    font-weight:700;

    color:#111827;

    margin-top:20px;
}

button{
    padding:12px 24px;

    font-size:18px;

    font-weight:700;

    border:none;

    border-radius:12px;

    cursor:pointer;

    background:#f1c40f;

    color:black;

    transition:.2s;

    display:block;
    margin:0 auto;
}

button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>
<div id="loginBox">

<h1>⚫ Hộp Đen Bí Ẩn ⚫</h1>
<h2>Đăng nhập đội</h2>

<input
    type="password"
    id="password"
    placeholder="Nhập mật mã">

<br><br>

<button onclick="login()">
Đăng nhập
</button>

</div>

<div id="gameArea" style="display:none;">
<h1>⚫ Hộp đen bí ẩn ⚫</h1>

<h2 id="teamName"></h2>

<div id="questionGrid">

<button class="questionBtn" onclick="openQuestion(1)">1</button>
<button class="questionBtn" onclick="openQuestion(2)">2</button>
<button class="questionBtn" onclick="openQuestion(3)">3</button>
<button class="questionBtn" onclick="openQuestion(4)">4</button>

<button class="questionBtn" onclick="openQuestion(5)">5</button>
<button class="questionBtn" onclick="openQuestion(6)">6</button>
<button class="questionBtn" onclick="openQuestion(7)">7</button>
<button class="questionBtn" onclick="openQuestion(8)">8</button>

<button class="questionBtn" onclick="openQuestion(9)">9</button>
<button class="questionBtn" onclick="openQuestion(10)">10</button>
<button class="questionBtn" onclick="openQuestion(11)">11</button>
<button class="questionBtn" onclick="openQuestion(12)">12</button>
</div>

<div id="questionBox">

<h2 id="questionText"></h2>

<div id="timer">30</div>

<input id="answer" placeholder="Nhập đáp án">

<button class="answerBtn" onclick="checkAnswer()">
Trả lời
</button>

<div id="result"></div>

</div>

<script>
    const questions = {

1:{
question:"Có bao nhiêu số 9 từ 1 đến 100?",
answer:"20",
reward:"+3"
},

2:{
question:"Tác phẩm 'Ai đã đặt tên cho dòng sông?' nhắc đến dòng sông nào?",
answer:"sông hương",
reward:"+1"
},

3:{
question:"Pakistan thuộc khu vực nào của châu Á?",
answer:"nam á",
reward:"+2"
},

4:{
question:"Tỉnh nào của Việt Nam có 3 mặt giáp biển?",
answer:"cà mau",
reward:"+2"
},

5:{
question:"1, 1, 2, 3, 5, 8, 13, ?",
answer:"21",
reward:"+1"
},

6:{
question:"Quốc gia nào có hình chiếc ủng trên bản đồ?",
answer:"ý",
reward:"+3"
},

7:{
question:"Theo ngũ hành, Mộc khắc gì?",
answer:"thổ",
reward:"+2"
},

8:{
question:"Thủ đô của Úc là gì?",
answer:"canberra",
reward:"+1"
},

9:{
question:"Có bao nhiêu Thiên Can?",
answer:"10",
reward:"-1"
},

10:{
question:"Sông nội địa dài nhất Việt Nam là sông nào?",
answer:["sông đồng nai","đồng nai"],
reward:"-2"
},

11:{
question:"1 khắc có bao nhiêu phút?",
answer:["15","15p","15 phút"],
reward:"-2"
},

12:{
question:"2, 6, 12, 20, 30, ?",
answer:"42",
reward:"-3"
}

};

let currentQuestion = 0;
let timeLeft = 30;
let timerInterval;
function openQuestion(number){

    if(teamUsage[currentTeam] >= 3){

        alert("Đội đã dùng hết 3 lượt!");

        return;
    }

    teamUsage[currentTeam]++;

    currentQuestion = number;
socket.emit("question-used", {
    team: currentTeam,
    question: number
});
    document.getElementById("questionBox").style.display =
        "block";

    document.getElementById("questionText").innerText =
        questions[number].question;

    document.getElementById("answer").value = "";

    document.getElementById("result").innerText = "";

    timeLeft = 30;

    document.getElementById("timer").innerText = 30;

    clearInterval(timerInterval);

    timerInterval = setInterval(()=>{

        timeLeft--;

        document.getElementById("timer").innerText =
            timeLeft;

        if(timeLeft <= 0){

            clearInterval(timerInterval);

            document.querySelectorAll(".questionBtn")
                [currentQuestion - 1]
                .classList.add("used");

            document.getElementById("result").innerText =
                "⏰ Hết giờ - Câu hỏi đã bị khóa";

        }

    },1000);

}

function checkAnswer(){

    const answer =
        document.getElementById("answer")
        .value
        .trim()
        .toLowerCase();

    clearInterval(timerInterval);

    document.querySelectorAll(".questionBtn")
        [currentQuestion - 1]
        .classList.add("used");

    const correct =
        questions[currentQuestion].answer;

    let isCorrect = false;

    if(Array.isArray(correct)){

        isCorrect = correct.includes(answer);

    }else{

        isCorrect = (answer === correct);

    }

    if(isCorrect){

        document.getElementById("result").innerText =
            "✅ Đúng! Hiệu ứng: " +
            questions[currentQuestion].reward;

    }else{

        document.getElementById("result").innerText =
            "❌ Sai!";
    }

}
let currentTeam = "";

const teamUsage = {
    yellow:0,
    green:0,
    blue:0,
    red:0
};

function login(){

    const pass =
        document.getElementById("password").value;

    if(pass === "vang312"){

        currentTeam = "yellow";

    }else if(pass === "luc231"){

        currentTeam = "green";

    }else if(pass === "lam213"){

        currentTeam = "blue";

    }else if(pass === "do321"){

        currentTeam = "red";

    }else{

        alert("Sai mật mã!");
        return;
    }

    document.getElementById("loginBox").style.display =
        "none";

    document.getElementById("gameArea").style.display =
        "block";
const teamTitle =
    document.getElementById("teamName");

if(currentTeam === "yellow"){
    teamTitle.innerText = "🟨 ĐỘI VÀNG";
    teamTitle.style.color = "#f1c40f";
}

if(currentTeam === "green"){
    teamTitle.innerText = "🟩 ĐỘI LỤC";
    teamTitle.style.color = "#27ae60";
}

if(currentTeam === "blue"){
    teamTitle.innerText = "🟦 ĐỘI LAM";
    teamTitle.style.color = "#3498db";
}

if(currentTeam === "red"){
    teamTitle.innerText = "🟥 ĐỘI ĐỎ";
    teamTitle.style.color = "#e74c3c";
}
    alert("Đăng nhập thành công!\nĐược chọn tối đa 3 câu.");
}
</script>
<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
</script>
</body>
</html>
